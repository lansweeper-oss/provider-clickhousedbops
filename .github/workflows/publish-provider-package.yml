name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version string to use while publishing the package (e.g. v1.0.0-alpha.1)
        default: ''
        required: false
      go-version:
        description: Go version to use if building needs to be done
        default: '1.26'
        required: false

env:
  DOCKER_BUILDX_VERSION: v0.32.1
  UP_VERSION: v0.39.0
  UPBOUND_REGORG: xpkg.upbound.io/lansweeper

jobs:
  publish-provider-package:
    runs-on: ubuntu-latest
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout ${{ github.repository }} ${{ inputs.version }}
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@6edd4406fa81c3da01a34fa6f6343087c207a568 # v3
        with:
          go-version: ${{ inputs.go-version }}

      - name: Build Artifacts
        id: build_artifacts
        run: |
          make -j BRANCH_NAME="main" ${{ inputs.version != '' && format('VERSION={0}', inputs.version) || '' }} build.all
        env:
          # We're using docker buildx, which doesn't actually load the images it
          # builds by default. Specifying --load does so.
          BUILD_ARGS: --load

      - name: Publish Artifacts
        run: |
          make BRANCH_NAME="main" ${{ inputs.version != '' && format('VERSION={0}', inputs.version) || '' }} publish

      - id: set
        name: Determine if mirroring to upbound
        run: |
          should_mirror=false
          if [[ -n "${{ secrets.XPKG_MIRROR_ACCESS_ID }}" && -n "${{ secrets.XPKG_MIRROR_TOKEN }}" ]]; then
            should_mirror=true
          fi
          echo "should_mirror=${should_mirror}" >> $GITHUB_OUTPUT
    outputs:
      should_mirror: ${{ steps.set.outputs.should_mirror }}

  mirror-to-xpkg-upbound-io:
    needs: publish-provider-package
    runs-on: ubuntu-latest
    if: ${{ needs.publish-provider-package.outputs.should_mirror == 'true' }}
    steps:
      - name: Setup crane
        # crane will inherit credentials from `docker login`
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Validate crane installation
        run: crane version

      - name: Login to Upbound
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}
          password: ${{ secrets.XPKG_MIRROR_TOKEN }}

      - name: Mirror to xpkg.upbound.io
        run: |
          crane copy ghcr.io/${{ github.repository }}:${{ inputs.version }} ${{ env.UPBOUND_REGORG }}/${{ github.event.repository.name }}:${{ inputs.version }} --allow-nondistributable-artifacts

