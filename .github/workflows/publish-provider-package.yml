name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version string to use while publishing the package (e.g. v1.0.0-alpha.1)
        default: ''
        required: false
      go-version:
        description: Go version to use if building needs to be done
        default: '1.26'
        required: false

jobs:
  publish-provider-package:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ github.event.inputs.go-version }}

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Find the Go version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            make common.buildvars >> $GITHUB_OUTPUT
          fi

      - name: Build Artifacts
        run: |-
          make -j2 XPKG_REG_ORGS="ghcr.io/${{ github.repository_owner }}" XPKG_REG_ORGS_NO_PROMOTE="ghcr.io/${{ github.repository_owner }}" BRANCH_NAME="main" VERSION="${{ steps.version.outputs.VERSION }}" build.all
        env:
          BUILD_ARGS: "--load"

      - name: Publish Artifacts
        run: |-
          make -j2 REGISTRY_ORGS="" XPKG_REG_ORGS="ghcr.io/${{ github.repository_owner }}" XPKG_REG_ORGS_NO_PROMOTE="ghcr.io/${{ github.repository_owner }}" BRANCH_NAME="main" VERSION="${{ steps.version.outputs.VERSION }}" publish

  mirror-to-upbound:
    needs: publish-provider-package
    runs-on: ubuntu-24.04
    if: ${{ github.event.inputs.version != '' }}
    steps:
      - name: Setup crane
        uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6

      - name: Login to Upbound
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}
          password: ${{ secrets.XPKG_MIRROR_TOKEN }}

      - name: Mirror to Upbound
        run: |
          crane copy ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }} xpkg.upbound.io/lansweeper/provider-clickhousedbops:${{ github.event.inputs.version }} --allow-nondistributable-artifacts
