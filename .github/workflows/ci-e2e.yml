name: Local E2E Tests

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Cleanup Disk
        # ClickHouse (~1 GB) + Kind + provider image consume significant disk space.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          large-packages: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go Modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run E2E Tests
        # make e2e: builds the provider image, creates a Kind cluster, deploys
        # Crossplane + the provider, applies e2e/manifests/, and waits for all
        # managed resources to become Ready. No cloud credentials required.
        run: make e2e

      - name: Collect Cluster Dump
        if: always()
        run: make controlplane.dump || true

      - name: Upload Cluster Dump
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-cluster-dump
          path: ./_output/controlplane-dump
