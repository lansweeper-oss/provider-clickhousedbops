apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  annotations:
    meta.crossplane.io/maintainer: Lansweeper <PlatformTeam@lansweeper.com>
    meta.crossplane.io/source: github.com/lansweeper-oss/provider-clickhousedbops
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: An Upjet-based Crossplane provider for managing ClickHouse database operations (databases, users, roles, and grants).
    meta.crossplane.io/readme: |
      `provider-clickhousedbops` is an Upjet-based Crossplane provider built on the
      ClickHouse database operations Terraform provider. It enables declarative
      management of ClickHouse databases, users, roles, role grants, and privilege
      grants as Crossplane Managed Resources.
  name: provider-clickhousedbops
spec:
  capabilities:
    - SafeStart
