apiVersion: v1
kind: Secret
metadata:
  name: user-password-hash
  namespace: crossplane-system
type: Opaque
stringData:
  # SHA256 hash of "my-secure-password" — replace with hash of your actual password
  hash: "8024102039a0d259ded6b6c6233199cc663f69df27a9a5338ac684422ed273d3"
---
apiVersion: clickhousedbops.m.crossplane.io/v1alpha1
kind: User
metadata:
  name: legacy-app-user
spec:
  forProvider:
    name: legacy_app_user
    hostIps:
      - "10.10.0.0/16"
  # Reference an existing secret containing the SHA256 password hash.
  # This is the direct approach - the hash is already computed and stored.
  # Use this when you have the hash pre-computed or from an external source.
  passwordSha256HashSecretRef:
    name: user-password-hash
    key: hash
    namespace: crossplane-system  # required for cluster-scoped resources
  providerConfigRef:
    name: default
