apiVersion: v1
kind: Secret
metadata:
  name: user-password-hash
  namespace: default
type: Opaque
stringData:
  # SHA256 hash of "my-secure-password"
  hash: "1f6d73bfbe3c78d7c2c3f1e9b4c8a2d5e3f1c0b9e8d7a6f5c4b3a2e1d0c9b8"
---
apiVersion: clickhousedbops.crossplane.io/v1alpha1
kind: User
metadata:
  name: legacy-app-user
  namespace: default
spec:
  forProvider:
    name: legacy_app_user
    hostIps:
      - "10.10.0.0/16"
  # Reference an existing secret containing the SHA256 password hash.
  # This is the direct approach - the hash is already computed and stored.
  # Use this when you have the hash pre-computed or from an external source.
  passwordSha256HashSecretRef:
    name: user-password-hash
    key: hash
  providerConfigRef:
    name: default
