apiVersion: v1
kind: Secret
metadata:
  name: my-app-password
  namespace: default
type: Opaque
stringData:
  password: "my-secure-password-12345"
---
apiVersion: clickhousedbops.crossplane.io/v1alpha1
kind: User
metadata:
  name: my-app-user
  namespace: default
spec:
  forProvider:
    name: my_app_user
    hostIps:
      - "192.168.0.0/16"
  # Reference an existing secret containing the plaintext password.
  # The controller will automatically:
  # 1. Read the password from the secret
  # 2. Compute the SHA256 hash
  # 3. Store the hash in the same secret under key "hash"
  # 4. Auto-set passwordSha256HashSecretRef for the Terraform provider
  passwordSecretRef:
    name: my-app-password
    key: password
    # namespace is optional - defaults to the resource namespace
  providerConfigRef:
    name: default
